<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GASTOS</title>
    <style>
 

    /* Custom button style */
    .scrollableWindow {
  width: 1100px; /* Set a fixed width */
  height: 500px; /* Set a fixed height */
  overflow-y: scroll; /* Enable vertical scrolling */
  border: 1px solid #030303; /* Add a border for visual clarity */
  padding: 10px;
  position: relative;
  top: 20px; /* Moves the div 20px down from its normal position */
  left: 30px; 
}
    button {
        background: linear-gradient(135deg, #000000,#084975);
        color: white;
        padding: 14px 28px;
        font-size: 12px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgb(120, 120, 121);
        transition: all 0.3s ease;
    } 
    button:hover {
        background: linear-gradient(135deg, #084975, #084975);
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(238, 241, 248, 0.3);
        
    } 

   body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 20px;
    background-color: #000c0c;
    color: #5b6e6e;
}
table {
    width: 30%;
    border-collapse: collapse;
    margin-top: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    background-color: #ffffff;
    border-radius: 10px; 
    overflow: hidden; /* Ensures rounded corners apply to table content */
}
    th, td {
      border: 1px solid #000c0c;
      padding: 8px;
      text-align: left;
    }  
    th {
      background-color: #ffffff;
    }
    .oculto {
      display: none; /* Clase para ocultar elementos */
    }
  </style>
</head>
